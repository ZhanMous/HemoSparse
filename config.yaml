# HemoSparse 配置文件

# 实验配置
experiment:
  data_flag: "bloodmnist"
  project_name: "HemoSparse"
  seed: 42
  t: 6  # 时间步长
  epochs: 50
  init_lr: 0.001
  batch_size: 64
  weight_decay: 0.0001
  step_size: 20
  gamma: 0.1

# 硬件配置
hardware:
  device: "cuda:0"
  use_amp: true
  pin_memory: true
  num_workers: 4
  grad_clip_norm: 1.0
  measure_power: true
  power_device_id: 0

# 模型配置
model:
  in_channels: 3
  num_classes: 8
  tau: 2.0
  v_threshold: 1.0

# 训练配置
training:
  optimizer: "adam"
  scheduler: "steplr"

# 可视化配置
visualization:
  fig_size: [10, 6]
  fig_dpi: 300
  colors: ["#1f77b4", "#ff7f0e", "#2ca02c", "#d62728", "#9467bd",
           "#8c564b", "#e377c2", "#7f7f7f", "#bcbd22", "#17becf"]
  markers: ["o", "s", "^", "D", "v", "<", ">", "p", "*", "h"]

# 输出路径配置
paths:
  root_dir: "."
  outputs_dir: "./outputs"
  models_dir: "./outputs/models"
  results_dir: "./outputs/results"
  figures_dir: "./outputs/figures"
  academic_figures_dir: "./outputs/figures/academic"
  data_figures_dir: "./outputs/figures/data"